version: '3.8'

services:
  # Reverse Proxy & SSL
  traefik:
    image: traefik:v2.10
    container_name: my-panel-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=admin@example.com" # Change to your email
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - my-panel-network

  # Backend API
  api:
    build: ./backend
    container_name: my-panel-api
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    environment:
      - PORT=4000
    networks:
      - my-panel-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`10.1.2.208`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=4000"
      - "traefik.http.routers.api.priority=10"

  # Frontend Web
  web:
    build: ./frontend
    container_name: my-panel-web
    networks:
      - my-panel-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`10.1.2.208`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      - "traefik.http.routers.web.priority=5"

  # Panel Internal Database
  db:
    image: postgres:15-alpine
    container_name: my-panel-db
    environment:
      - POSTGRES_USER=panel_admin
      - POSTGRES_PASSWORD=panel_secret_password
      - POSTGRES_DB=mypanel
    volumes:
      - ./data/db:/var/lib/postgresql/data
    networks:
      - my-panel-network

networks:
  my-panel-network:
    driver: bridge
